server {
    listen 8080;
    listen [::]:8080;
    server_name localhost;

    location /matches/ {
        proxy_pass http://icarus-matches:4002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /matches {
        return 301 /matches/;
    }

    location /auth/ {
        proxy_pass http://icarus-auth:4001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /auth {
        return 301 /auth/;
    }

    location /rooms/ {
        proxy_pass http://icarus-rooms:4003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /rooms {
        return 301 /rooms/;
    }

    location /analytics/ {
        proxy_pass http://icarus-analytics:4004/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /analytics {
        return 301 /analytics/;
    }

    location / {
        return 200 'Icarus API Gateway running';
        add_header Content-Type text/plain;
    }
}